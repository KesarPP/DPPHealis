name: dpp_app
description: Digital Diabetes Prevention Program - Skeleton App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.13.1
  font_awesome_flutter: ^11.0.0
  fl_chart: ^1.2.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  provider: ^6.1.5+1
  crypto: ^3.0.7
  image_picker: ^1.2.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.6
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.5
  permission_handler: ^11.3.0
  intl: ^0.19.0
  http: ^1.2.0
  health: ^13.3.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  firebase_ai: ^3.13.0
  flutter_timezone: ^5.1.0
  firebase_app_check: ^0.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

  webview_flutter_platform_interface: any
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/coaches/
    - assets/images/ffq/beverages/
    - assets/images/ffq/cereals_breads_prep/
    - assets/images/ffq/condiments_sideitems/
    - assets/images/ffq/dairy_milk/
    - assets/images/ffq/fruits_seasonal_regular/
    - assets/images/ffq/meat_fish_eggs/
    - assets/images/ffq/pulses_legumes/
    - assets/images/ffq/snacks_sweets/
    - assets/images/ffq/vegetables/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/diaprevent_logo.png"
