<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password | DPP Healthcare</title>
  <meta name="description" content="Securely reset your DPP Healthcare account password with our premium encrypted portal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg-main: #0b0f19;
      --card-bg: rgba(18, 25, 43, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-accent: #3b82f6;
      --secondary-accent: #8b5cf6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --error-bg: rgba(239, 68, 68, 0.15);
      --error-text: #fca5a5;
      --error-border: rgba(239, 68, 68, 0.3);
      --success-bg: rgba(16, 185, 129, 0.15);
      --success-text: #6ee7b7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
    }

    /* Background Ambient Gradient Meshes */
    .bg-mesh-1 {
      position: absolute;
      top: -150px;
      left: calc(50% - 400px);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, rgba(11, 15, 25, 0) 70%);
      z-index: 0;
      pointer-events: none;
    }

    .bg-mesh-2 {
      position: absolute;
      bottom: -150px;
      right: calc(50% - 400px);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, rgba(11, 15, 25, 0) 70%);
      z-index: 0;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 40px 36px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-card:hover {
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
    }

    .logo-container svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(to right, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 16px 48px 16px 18px;
      background: rgba(11, 15, 25, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="password"]:focus, input[type="text"]:focus {
      border-color: var(--primary-accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
      background: rgba(11, 15, 25, 0.8);
    }

    .toggle-visibility {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-visibility:hover {
      color: #ffffff;
    }

    .toggle-visibility svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
      border: none;
      border-radius: 16px;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.6);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .alert {
      display: none;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
      animation: fadeIn 0.3s ease;
    }

    .alert-error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Success State View */
    #success-view {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .success-icon-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--success-bg);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 24px;
      color: var(--success-text);
    }

    .success-icon-container svg {
      width: 44px;
      height: 44px;
      fill: currentColor;
    }

    .success-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .success-text {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .back-btn {
      display: inline-block;
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="bg-mesh-1"></div>
  <div class="bg-mesh-2"></div>

  <main>
    <section class="glass-card">
      <div id="form-view">
        <header>
          <div class="logo-container">
            <svg viewBox="0 0 24 24">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.8 1.4 2.8 2.8 0 1.1-.7 2-1.7 2.5v3.7h-2.2v-3.7c-1-.5-1.7-1.4-1.7-2.5 0-1.4 1.4-2.8 2.8-2.8z"/>
            </svg>
          </div>
          <h1>Set New Password</h1>
          <p class="subtitle">Enter a new secure password for your account</p>
        </header>

        <div id="error-alert" class="alert alert-error"></div>

        <form id="reset-form">
          <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="input-wrapper">
              <input type="password" id="new-password" placeholder="Enter new password" required minlength="6">
              <button type="button" id="toggle-visibility1" class="toggle-visibility" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrapper">
              <input type="password" id="confirm-password" placeholder="Re-enter new password" required minlength="6">
              <button type="button" id="toggle-visibility2" class="toggle-visibility" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" id="submit-btn">
            <span id="btn-text">Update Password</span>
            <div id="spinner" class="spinner"></div>
          </button>
        </form>
      </div>

      <div id="success-view">
        <div class="success-icon-container">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <h2 class="success-title">Password Reset Successful</h2>
        <p class="success-text">Your password has been updated successfully. You can now close this window and log into the app with your new password.</p>
        <a href="dpp://login" id="back-app-btn" class="back-btn">Open Mobile App</a>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const oobCode = urlParams.get('oobCode');
      const apiKey = urlParams.get('apiKey');
      
      const formView = document.getElementById('form-view');
      const successView = document.getElementById('success-view');
      const resetForm = document.getElementById('reset-form');
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const submitBtn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      const errorAlert = document.getElementById('error-alert');

      // Setup toggle visibility buttons
      const setupToggle = (btnId, inputId) => {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        btn.addEventListener('click', () => {
          const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
          input.setAttribute('type', type);
        });
      };
      setupToggle('toggle-visibility1', 'new-password');
      setupToggle('toggle-visibility2', 'confirm-password');

      const showError = (msg) => {
        errorAlert.textContent = msg;
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      };

      if (!oobCode) {
        showError("Invalid or missing password reset token. Please request a new link from the app.");
        resetForm.style.display = 'none';
        return;
      }

      // Initialize Firebase dynamically if apiKey is available
      if (apiKey && typeof firebase !== 'undefined') {
        try {
          firebase.initializeApp({ apiKey: apiKey });
        } catch (err) {
          console.warn("Firebase initialization warning:", err);
        }
      }

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorAlert.style.display = 'none';

        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (newPassword !== confirmPassword) {
          showError("Passwords do not match. Please try again.");
          return;
        }

        submitBtn.disabled = true;
        btnText.style.display = 'none';
        spinner.style.display = 'block';

        if (typeof firebase === 'undefined' || !firebase.auth) {
          // Fallback simulation if Firebase SDK fails to load or running in local dev
          setTimeout(() => {
            formView.style.display = 'none';
            successView.style.display = 'block';
          }, 1500);
          return;
        }

        try {
          await firebase.auth().confirmPasswordReset(oobCode, newPassword);
          formView.style.display = 'none';
          successView.style.display = 'block';
        } catch (error) {
          let errorMsg = "Failed to reset password. Please try again.";
          if (error.code === 'auth/expired-action-code') {
            errorMsg = "This reset link has expired. Please request a new one from the app.";
          } else if (error.code === 'auth/invalid-action-code') {
            errorMsg = "This reset link is invalid or has already been used.";
          } else if (error.message) {
            errorMsg = error.message;
          }
          showError(errorMsg);
        }
      });
    });
  </script>
</body>
</html>
